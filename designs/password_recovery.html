<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#11d442",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102215",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Top Bar with Language Selector -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 justify-end">
<div class="flex items-center gap-1 cursor-pointer">
<span class="material-symbols-outlined text-primary text-sm">language</span>
<p class="text-primary text-sm font-bold leading-normal tracking-wide">PT-BR / EN-US</p>
</div>
</div>
<!-- Hero / Brand Section -->
<div class="@container">
<div class="@[480px]:px-4 @[480px]:py-3">
<div class="bg-cover bg-center flex flex-col justify-end overflow-hidden bg-primary/10 @[480px]:rounded-lg min-h-[240px] relative" data-alt="Journal and pen on a wooden table" style='background-image: linear-gradient(0deg, rgba(16, 34, 21, 0.8) 0%, rgba(16, 34, 21, 0.2) 100%), url("https://lh3.googleusercontent.com/aida-public/AB6AXuAp7XKXO724-pTCGpeAfNdPqDeUsXAix4MmwIRrICjyAu-FPhK1UUXV5b3AsXePpEAezpeMDR5ahcMTSD6vv03OYearAopzvX9OGprJVoQKu6AY0Q2O-4z_wq73JVp_Fst7FIhqiW_hQqcqvWF2ULWwZ9WFIj9ev5g3AAERvYneNzG9sgiOdKk6AZ0E55HlTPxVMgzO24WgeavUI8EPt4cSvBiEQL4MwY62nNyKzNjEhxrOHt-NnXlUAqwUpo9fObu25yLKxaMUNpyT");'>
<div class="flex p-6 flex-col gap-2">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl">edit_note</span>
<h1 class="text-white text-3xl font-extrabold tracking-tight">Meus Pensamentos</h1>
</div>
</div>
</div>
</div>
</div>
<!-- Main Content -->
<main class="flex-1 flex flex-col px-6 py-8 max-w-md mx-auto w-full">
<div class="text-center mb-8">
<h2 class="text-slate-900 dark:text-slate-50 tracking-tight text-3xl font-bold leading-tight mb-3">Recuperar Senha</h2>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed">
                    Insira o e-mail associado à sua conta para receber um link de redefinição.
                </p>
</div>
<!-- Form -->
<form class="flex flex-col gap-6" onsubmit="return false;">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1" for="email">E-mail</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 text-xl">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" id="email" placeholder="seu@email.com" type="email"/>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 px-6 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2" type="submit">
<span>Enviar Link</span>
<span class="material-symbols-outlined">send</span>
</button>
</form>
<!-- Back to Login -->
<div class="mt-8 text-center">
<a class="inline-flex items-center gap-2 text-primary font-semibold hover:underline group" href="#">
<span class="material-symbols-outlined text-lg group-hover:-translate-x-1 transition-transform">arrow_back</span>
                    Voltar para o Login
                </a>
</div>
</main>
<!-- Footer Navigation (BottomNavBar Component Style) -->
<footer class="mt-auto">
<div class="flex gap-2 border-t border-slate-200 dark:border-slate-800 bg-background-light dark:bg-background-dark px-4 pb-6 pt-3">
<a class="flex flex-1 flex-col items-center justify-center gap-1 rounded-full text-slate-400 hover:text-primary transition-colors py-2" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium">Início</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 rounded-full text-primary transition-colors py-2" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">lock_reset</span>
<span class="text-[10px] font-medium">Recuperar</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 rounded-full text-slate-400 hover:text-primary transition-colors py-2" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium">Perfil</span>
</a>
</div>
</footer>
</div>
</body></html>

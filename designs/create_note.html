<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#11d442",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102215",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex h-screen w-full flex-col overflow-x-hidden">
<!-- Top App Bar -->
<header class="flex items-center justify-between px-4 py-4 sticky top-0 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md z-10 border-b border-primary/10">
<div class="flex items-center gap-3">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-primary/10 transition-colors text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-lg font-bold leading-tight tracking-tight">Nova Nota</h2>
</div>
<button class="bg-primary text-slate-900 font-bold px-6 py-2 rounded-full hover:bg-primary/90 transition-colors shadow-sm">
                Salvar
            </button>
</header>
<main class="flex flex-col flex-1 pb-20">
<!-- Title Input -->
<div class="px-4 py-6">
<label class="block mb-2 text-sm font-semibold text-primary/80 uppercase tracking-wider">Título</label>
<input class="w-full bg-transparent border-none p-0 text-2xl font-extrabold focus:ring-0 placeholder:text-slate-400 dark:placeholder:text-slate-600 text-slate-900 dark:text-slate-100" placeholder="Dê um nome ao seu pensamento" type="text"/>
</div>
<!-- Content Area -->
<div class="px-4 py-2 flex-1">
<label class="block mb-2 text-sm font-semibold text-primary/80 uppercase tracking-wider">Conteúdo</label>
<textarea class="w-full min-h-[250px] bg-transparent border-none p-0 text-lg leading-relaxed focus:ring-0 resize-none placeholder:text-slate-400 dark:placeholder:text-slate-600 text-slate-800 dark:text-slate-200" placeholder="Escreva seu pensamento..."></textarea>
</div>
<!-- Category Section -->
<div class="px-4 py-6">
<h3 class="text-sm font-semibold text-primary/80 uppercase tracking-wider mb-4">Categoria</h3>
<div class="flex gap-2 flex-wrap">
<button class="flex items-center justify-center px-4 py-2 rounded-full bg-primary text-slate-900 text-sm font-semibold">
                        Reflexão
                    </button>
<button class="flex items-center justify-center px-4 py-2 rounded-full bg-primary/10 border border-primary/20 text-slate-700 dark:text-slate-300 text-sm font-medium hover:bg-primary/20 transition-colors">
                        Ideia
                    </button>
<button class="flex items-center justify-center px-4 py-2 rounded-full bg-primary/10 border border-primary/20 text-slate-700 dark:text-slate-300 text-sm font-medium hover:bg-primary/20 transition-colors">
                        Tarefas
                    </button>
<button class="flex items-center justify-center px-4 py-2 rounded-full bg-primary/10 border border-primary/20 text-slate-700 dark:text-slate-300 text-sm font-medium hover:bg-primary/20 transition-colors">
                        Pessoal
                    </button>
</div>
</div>
<!-- Action Options -->
<div class="px-4 py-4 grid grid-cols-2 gap-3">
<button class="flex items-center justify-center gap-2 p-4 rounded-xl bg-background-light dark:bg-slate-800 border-2 border-primary/10 hover:border-primary/40 transition-all group">
<span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform">image</span>
<span class="text-sm font-bold">Adicionar Imagem</span>
</button>
<button class="flex items-center justify-center gap-2 p-4 rounded-xl bg-background-light dark:bg-slate-800 border-2 border-primary/10 hover:border-primary/40 transition-all group">
<span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform">notifications</span>
<span class="text-sm font-bold">Definir Lembrete</span>
</button>
</div>
<!-- Attachment Preview Area (Optional visual) -->
<div class="px-4 py-2">
<div class="relative w-full aspect-video rounded-xl overflow-hidden bg-slate-200 dark:bg-slate-800 border border-primary/5">
<img class="w-full h-full object-cover opacity-60 mix-blend-overlay" data-alt="Abstract workspace with notebook and pen" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAqZw7FeBUKoZICl3CWxQpB3BgxfzMB0xPF-4dNdS550iGVzETDMH5Eic8hMRT7cd4QFLuyLvnRH4l3FbeYw4Ns87lcNGLz8pgGc8E5el2zynDyqod1aBNGVspLY7KXBIWEBtNKHh9q0FclZF_F1X-H2XlgbBYW6xrKUno9S3B0Hj7LedP_gSL4cTqgkMXFdfmB5gRghD_QDDa2tNZyy2UY3tY0Dc6_IbFUqzp4_XRN2t2M1bUP5e0xFWNSm-Kz4St2e0S7f0X8R6gu"/>
<div class="absolute inset-0 flex items-center justify-center flex-col gap-2">
<span class="material-symbols-outlined text-4xl text-primary/40">add_photo_alternate</span>
<p class="text-xs text-slate-500 font-medium">Nenhuma imagem selecionada</p>
</div>
</div>
</div>
</main>
<!-- Floating Action or Toolbar for editing (Optional enhancement) -->
<div class="fixed bottom-6 left-1/2 -translate-x-1/2 flex items-center bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 px-6 py-3 rounded-full shadow-xl gap-6 z-20">
<button class="hover:text-primary transition-colors"><span class="material-symbols-outlined">format_bold</span></button>
<button class="hover:text-primary transition-colors"><span class="material-symbols-outlined">format_italic</span></button>
<button class="hover:text-primary transition-colors"><span class="material-symbols-outlined">format_list_bulleted</span></button>
<div class="w-[1px] h-6 bg-slate-700 dark:bg-slate-300"></div>
<button class="hover:text-primary transition-colors"><span class="material-symbols-outlined">mic</span></button>
</div>
</div>
</body></html>

<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#11d442",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102215",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display">
<!-- Top Navigation / Language Selector -->
<header class="flex items-center justify-between p-6">
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xl">psychology</span>
</div>
<span class="text-slate-900 dark:text-slate-100 font-bold text-lg tracking-tight">Meus Pensamentos</span>
</div>
<div class="flex items-center">
<button class="flex items-center gap-1 text-primary text-sm font-bold leading-normal tracking-wide hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-base">language</span>
<span>PT-BR / EN-US</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col items-center justify-center px-6 py-12">
<div class="w-full max-w-md flex flex-col items-center text-center">
<!-- Success Illustration/Icon -->
<div class="relative mb-8">
<div class="w-32 h-32 bg-primary/10 rounded-full flex items-center justify-center">
<div class="w-24 h-24 bg-primary/20 rounded-full flex items-center justify-center">
<div class="w-16 h-16 bg-primary rounded-full flex items-center justify-center shadow-lg shadow-primary/30">
<span class="material-symbols-outlined text-white text-4xl">mark_email_read</span>
</div>
</div>
</div>
<!-- Abstract floating elements -->
<div class="absolute -top-2 -right-2 w-6 h-6 bg-primary/20 rounded-full blur-sm"></div>
<div class="absolute bottom-2 -left-4 w-4 h-4 bg-primary/30 rounded-full blur-[2px]"></div>
</div>
<!-- Text Content -->
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-extrabold leading-tight tracking-tight mb-4">
                E-mail Enviado!
            </h1>
<p class="text-slate-600 dark:text-slate-400 text-base leading-relaxed mb-10 max-w-xs">
                Enviamos um link de recuperação para o seu e-mail. Por favor, verifique sua caixa de entrada e spam.
            </p>
<!-- Action Button -->
<div class="w-full space-y-4">
<button class="w-full flex items-center justify-center gap-2 overflow-hidden rounded-xl h-14 px-6 bg-primary text-slate-900 text-base font-bold leading-normal tracking-wide shadow-lg shadow-primary/20 hover:brightness-105 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined">arrow_back</span>
<span class="truncate">Voltar ao Login</span>
</button>
<button class="w-full flex items-center justify-center gap-2 overflow-hidden rounded-xl h-14 px-6 bg-primary/10 text-primary text-sm font-bold leading-normal tracking-wide hover:bg-primary/20 transition-all">
<span class="material-symbols-outlined text-base">forward_to_inbox</span>
<span class="truncate">Não recebeu? Reenviar e-mail</span>
</button>
</div>
</div>
</main>
<!-- Footer decoration or app context -->
<footer class="p-6 flex justify-center">
<div class="w-full max-w-sm rounded-2xl bg-white dark:bg-slate-800/50 p-4 border border-primary/5 flex items-center gap-4">
<div class="bg-primary/10 p-2 rounded-lg">
<span class="material-symbols-outlined text-primary">info</span>
</div>
<p class="text-slate-500 dark:text-slate-400 text-xs leading-tight">
                Dica: Verifique se o endereço de e-mail inserido está correto. O link expira em 30 minutos.
            </p>
</div>
</footer>
<!-- Background Decoration -->
<div class="fixed top-0 right-0 -z-10 w-64 h-64 bg-primary/5 rounded-full blur-[100px]"></div>
<div class="fixed bottom-0 left-0 -z-10 w-96 h-96 bg-primary/5 rounded-full blur-[120px]"></div>
</body></html>
